<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutor Studio - Aula Studio</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body style="align-items: flex-start;">

<div class="studio-layout">
    <!-- Sidebar Materie -->
    <aside class="studio-sidebar">
        <div class="sidebar-header">
            <h2 style="font-size: 1.5rem;">Le tue Materie</h2>
            <button class="btn-secondary" style="width: auto; padding: 0.5rem; border-radius: 8px;" onclick="window.location.href='/dashboard.html'">← Dashboard</button>
        </div>
        <div class="sidebar-materie" id="sidebarMaterieList">
            <!-- Lista materie -->
            <p style="padding: 1rem;" class="text-secondary">Caricamento...</p>
        </div>
    </aside>

    <!-- Main Chat Area -->
    <main class="studio-main" id="chatContainer" style="display: none;">
        <header class="chat-header">
            <div>
                <h2 id="chatTitle">Nome Materia</h2>
                <p class="text-secondary" style="font-size: 0.875rem;">AI Tutor online</p>
            </div>
            <div class="chat-tools">
                <button class="tool-btn" id="btnPomodoro">⏱️ 25:00</button>
                <button class="tool-btn" id="btnAiuto">🆘 Aiuto Scemo</button>
                <button class="tool-btn" id="btnDistraggo">⚠️ Mi distraggo!</button>
            </div>
        </header>

        <div class="chat-messages" id="chatArea">
            <div class="message ai">
                Benvenuto nell'aula studio! Seleziona una materia per iniziare. Sono il tuo tutor AI.
            </div>
        </div>

        <form class="chat-input-area" id="chatForm">
            <input type="text" id="chatInput" placeholder="Scrivi una domanda sulla materia..." required autocomplete="off">
            <button type="submit" id="sendBtn">➤</button>
        </form>
    </main>

    <!-- Empty State Area when no materia is selected -->
    <main class="studio-main" id="emptyState" style="align-items: center; justify-content: center;">
        <h1 style="color: var(--text-secondary);">Seleziona una materia a sinistra per iniziare</h1>
    </main>
</div>

<script src="/js/studio.js"></script>
</body>
</html>
